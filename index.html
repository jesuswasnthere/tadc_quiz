
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <meta name="color-scheme" content="light dark">
    <title>Quiz TADC - Los 8 personajes</title>
    <!-- Pico.css ultraligero -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <!-- Estilos personalizados -->
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <main class="container">
        <div class="quiz-card">
            <h1>🎪 TADC QUIZ 🎭</h1>
            <div class="sub">¿A qué personaje del Circo Digital te pareces?</div>
            <div id="preguntasArea"></div>
            <button id="btnCalcular" class="contrast" style="width:100%; font-weight:bold;">✨ Descubrir mi personaje ✨</button>
            <div id="resultadoArea" style="display: none;"></div>
        </div>
        <footer>Basado en personalidades + empleos secretos de TADC</footer>
    </main>

    <!-- Botón flotante para cambiar tema (claro/oscuro) -->
    <button id="themeToggle" class="theme-toggle" aria-label="Cambiar tema">🌓</button>

    <!-- Script del quiz -->
    <script src="js/quiz.js"></script>

    <!-- Script para el cambio de tema con soporte táctil -->
    <script>
        (function() {
            function setTheme(isDark) {
                if (isDark) {
                    document.documentElement.classList.add('dark-theme');
                } else {
                    document.documentElement.classList.remove('dark-theme');
                }
                localStorage.setItem('tadc-theme', isDark ? 'dark' : 'light');
                const btn = document.getElementById('themeToggle');
                if (btn) btn.textContent = isDark ? '☀️' : '🌙';
            }

            function toggleTheme(e) {
                e.preventDefault();
                const isDark = document.documentElement.classList.contains('dark-theme');
                setTheme(!isDark);
                const btn = document.getElementById('themeToggle');
                if (btn) {
                    btn.style.transform = 'scale(0.9)';
                    setTimeout(() => { if (btn) btn.style.transform = ''; }, 150);
                }
            }

            const toggleBtn = document.getElementById('themeToggle');
            if (toggleBtn) {
                const savedTheme = localStorage.getItem('tadc-theme');
                if (savedTheme === 'dark') setTheme(true);
                else if (savedTheme === 'light') setTheme(false);
                else setTheme(window.matchMedia('(prefers-color-scheme: dark)').matches);
                toggleBtn.addEventListener('click', toggleTheme);
                toggleBtn.addEventListener('touchstart', toggleTheme);
            }
        })();
    </script>
</body>
</html>
